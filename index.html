<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Gezi Takip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gezi">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #232733;
    --text: #f2f3f5;
    --muted: #8b919e;
    --accent: #4f8cff;
    --green: #34c77b;
    --red: #e05252;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); overscroll-behavior-y: none; }
  .screen { display: none; max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; }
  .screen.active { display: block; }
  h1 { font-size: 26px; font-weight: 700; margin: 0; }

  .home-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .home-head .city { font-size: 26px; font-weight: 700; }
  .gear-btn { background: var(--card); border: 1px solid #2a2f3a; color: var(--muted);
    width: 40px; height: 40px; border-radius: 12px; font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .gear-btn:active { background: var(--card2); }

  .topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .topbar h1 { flex: 1; text-align: center; font-size: 20px; }
  .topbar .spacer { width: 40px; flex-shrink: 0; }
  .back-btn { width: 40px; height: 40px; flex-shrink: 0; border-radius: 12px;
    background: var(--card); border: 1px solid #2a2f3a; color: var(--text);
    display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .back-btn:active { background: var(--card2); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .chip { background: var(--card); border: 1px solid #2a2f3a; border-radius: 20px;
    padding: 8px 14px; font-size: 14px; color: var(--text); cursor: pointer; }
  .chip.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .7px; color: var(--muted); margin: 20px 0 8px; }
  input[type="text"], input[type="url"] {
    width: 100%; background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    color: var(--text); font-size: 17px; padding: 14px; appearance: none; -webkit-appearance: none; }
  input:focus { border-color: var(--accent); outline: none; }

  .cat-group { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px;
    color: var(--muted); margin: 18px 0 8px; }
  .cat-group:first-child { margin-top: 4px; }

  .place { display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid #2a2f3a; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; }
  .place:active { background: var(--card2); }
  .place .info { flex: 1; min-width: 0; }
  .place .name { font-size: 16px; }
  .place .area { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .place.done .name { color: var(--muted); text-decoration: line-through; }
  .toggle { width: 26px; height: 26px; flex-shrink: 0; border-radius: 50%;
    border: 2px solid #3a4150; display: flex; align-items: center; justify-content: center; }
  .place.done .toggle { background: var(--green); border-color: var(--green); }
  .toggle svg { display: none; }
  .place.done .toggle svg { display: block; }

  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; line-height: 1.5; }

  .list-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-top: 22px; }
  .summary { font-size: 14px; color: var(--muted); font-weight: 600; }
  .add-btn { background: var(--accent); border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 600; padding: 12px 18px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(79, 140, 255, .25); white-space: nowrap; }
  .add-btn:active { opacity: .85; }

  .primary { width: 100%; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 17px; font-weight: 600; padding: 16px; margin-top: 28px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(79, 140, 255, .25); }
  .primary:active { opacity: .85; }
  .primary:disabled { opacity: .5; }

  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #fff; padding: 12px 22px; border-radius: 16px;
    font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: all .25s;
    z-index: 50; max-width: 90%; width: max-content; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--red); }

  .setup-box { background: var(--card); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
  .setup-box p { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .setup-err { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 16px; line-height: 1.4; }
</style>
</head>
<body>

<!-- LİSTE (ANA EKRAN) -->
<section id="home" class="screen active">
  <div class="home-head">
    <span class="city">Hanoi</span>
    <button class="gear-btn" onclick="show('setup')" aria-label="Ayarlar">⚙️</button>
  </div>
  <div class="chips" id="statusChips"></div>
  <div class="chips" id="catChips"></div>
  <div id="list"></div>
  <div class="list-foot">
    <span class="summary" id="summary"></span>
    <button class="add-btn" onclick="show('add')">＋ Yer ekle</button>
  </div>
</section>

<!-- YER EKLE -->
<section id="add" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="show('home')" aria-label="Geri">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1>Yer Ekle</h1>
    <span class="spacer"></span>
  </div>
  <label for="pName">Ad</label>
  <input type="text" id="pName" placeholder="Örn. Hoan Kiem Gölü" autocomplete="off">
  <label>Kategori</label>
  <div class="chips" id="addCatChips"></div>
  <label for="pArea">Semt (isteğe bağlı)</label>
  <input type="text" id="pArea" placeholder="Örn. Old Quarter" autocomplete="off">
  <label for="pNote">Not (isteğe bağlı)</label>
  <input type="text" id="pNote" placeholder="" autocomplete="off">
  <button class="primary" id="saveBtn" onclick="savePlace()">Kaydet</button>
</section>

<!-- KURULUM -->
<section id="setup" class="screen">
  <div class="topbar">
    <button class="back-btn" id="setupBack" onclick="show('home')" aria-label="Geri">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1>Kurulum</h1>
    <span class="spacer"></span>
  </div>
  <div class="setup-box">
    <p>Supabase proje adresini ve API anahtarını gir (cihaz başına tek seferlik). Anahtarı Supabase'de Project Settings → API bölümünde bulursun.</p>
    <label for="supaUrl">Supabase URL</label>
    <input type="url" id="supaUrl" placeholder="https://xxxx.supabase.co">
    <label for="supaKey">API anahtarı (anon / publishable)</label>
    <input type="text" id="supaKey" placeholder="eyJhbGci... veya sb_publishable_...">
    <div class="setup-err" id="setupErr"></div>
    <button class="primary" id="connectBtn" onclick="saveConfig()">Bağlan ve test et</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
// ── Yapılandırma ──────────────────────────────────────────────
const cfg = {
  url: localStorage.getItem("supaUrl") || "",
  key: localStorage.getItem("supaKey") || "",
};
const CITY = "Hanoi";
const $ = (id) => document.getElementById(id);

// Kategoriler: slug → Türkçe etiket (sabit sıra)
const CATS = [
  { slug: "museum",   label: "Müze" },
  { slug: "district", label: "Bölge" },
  { slug: "sight",    label: "Görülecek" },
  { slug: "trip",     label: "Kaçamak" },
  { slug: "food",     label: "Yemek" },
];
const CAT_LABEL = Object.fromEntries(CATS.map(c => [c.slug, c.label]));

// ── Durum ─────────────────────────────────────────────────────
let places = [];        // şehrin tüm kayıtları (önbellek)
let fStatus = "all";    // all | todo | done
let fCat = "all";       // all | <slug>
let addCat = "sight";   // yer ekle ekranındaki seçili kategori

// ── Ekran geçişi ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo(0, 0);
  if (id === "home") loadPlaces();
  if (id === "add") {
    $("pName").value = ""; $("pArea").value = ""; $("pNote").value = "";
    addCat = "sight"; renderAddChips();
  }
  if (id === "setup") {
    $("supaUrl").value = cfg.url; $("supaKey").value = cfg.key;
    $("setupErr").textContent = "";
    $("setupBack").style.visibility = (cfg.url && cfg.key) ? "visible" : "hidden";
  }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, isErr) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "toast", isErr ? 5000 : 2200);
}

// Supabase hatasını anlaşılır Türkçeye çevirir.
async function httpErrorText(res) {
  let detail = "";
  try { const j = await res.json(); detail = j.message || j.hint || ""; } catch (e) {}
  if (res.status === 401 || res.status === 403)
    return "Yetki hatası (" + res.status + "): API anahtarı yanlış ya da tabloda izin (RLS) politikası eksik." + (detail ? " — " + detail : "");
  if (res.status === 404)
    return "Tablo bulunamadı (404): 'places' tablosu yok. Supabase SQL Editor'da KURULUM.md'deki SQL'i çalıştır.";
  return "Sunucu hatası (" + res.status + ")" + (detail ? ": " + detail : "");
}

// ── Supabase REST ─────────────────────────────────────────────
function headers() {
  return {
    "apikey": cfg.key,
    "Authorization": "Bearer " + cfg.key,
    "Content-Type": "application/json",
  };
}

// Ad: baş/son boşlukları at, iç boşlukları teke indir (yer adlarında büyük/küçük harf korunur).
const normName = (s) => s.trim().replace(/\s+/g, " ");

const escapeHtml = (s) =>
  String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// ── Liste yükleme + filtre + render ───────────────────────────
async function loadPlaces() {
  const list = $("list");
  renderFilterChips();
  if (!cfg.url || !cfg.key) return;
  list.innerHTML = '<div class="empty">Yükleniyor…</div>';
  try {
    const res = await fetch(cfg.url + "/rest/v1/places?city=eq." + encodeURIComponent(CITY) + "&select=*&order=name.asc", { headers: headers() });
    if (!res.ok) throw new Error(await httpErrorText(res));
    places = await res.json();
    renderList();
  } catch (e) {
    const msg = e.message && e.message.length > 5 ? e.message : "Veriler alınamadı. Bağlantını kontrol et.";
    list.innerHTML = '<div class="empty">' + escapeHtml(msg) + "</div>";
    $("summary").textContent = "";
  }
}

function renderFilterChips() {
  const statuses = [["all", "Hepsi"], ["todo", "Gezilecek"], ["done", "Gezildi"]];
  $("statusChips").innerHTML = statuses.map(([v, l]) =>
    `<button class="chip${fStatus === v ? " sel" : ""}" onclick="setStatusFilter('${v}')">${l}</button>`).join("");
  let cats = `<button class="chip${fCat === "all" ? " sel" : ""}" onclick="setCatFilter('all')">Hepsi</button>`;
  cats += CATS.map(c =>
    `<button class="chip${fCat === c.slug ? " sel" : ""}" onclick="setCatFilter('${c.slug}')">${c.label}</button>`).join("");
  $("catChips").innerHTML = cats;
}

function setStatusFilter(v) { fStatus = v; renderFilterChips(); renderList(); }
function setCatFilter(v) { fCat = v; renderFilterChips(); renderList(); }

function renderList() {
  const list = $("list");
  // Özet her zaman tüm şehir ilerlemesini gösterir (filtreden bağımsız).
  const total = places.length;
  const doneCount = places.filter(p => p.status === "done").length;
  $("summary").textContent = total ? doneCount + "/" + total + " gezildi" : "";

  if (!total) {
    list.innerHTML = '<div class="empty">Henüz yer yok.<br>＋ Yer ekle ile başla.</div>';
    return;
  }

  const filtered = places.filter(p =>
    (fStatus === "all" || p.status === fStatus) &&
    (fCat === "all" || (p.category || "") === fCat));

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Bu filtrede yer yok.</div>';
    return;
  }

  // Kategoriye göre grupla (sabit sıra), grup içinde ada göre (zaten sıralı geldi).
  let html = "";
  for (const c of CATS) {
    const rows = filtered.filter(p => (p.category || "") === c.slug);
    if (!rows.length) continue;
    if (fCat === "all") html += `<div class="cat-group">${c.label}</div>`;
    html += rows.map(rowHtml).join("");
  }
  // Kategorisi tanımsız kayıtlar (olursa) en sona "Diğer" altında.
  const other = filtered.filter(p => !CAT_LABEL[p.category]);
  if (other.length) {
    if (fCat === "all") html += `<div class="cat-group">Diğer</div>`;
    html += other.map(rowHtml).join("");
  }
  list.innerHTML = html;
}

function rowHtml(p) {
  const area = p.area ? `<div class="area">${escapeHtml(p.area)}</div>` : "";
  return `
    <div class="place${p.status === "done" ? " done" : ""}" onclick="toggleStatus('${p.id}')">
      <div class="info">
        <div class="name">${escapeHtml(p.name)}</div>
        ${area}
      </div>
      <span class="toggle">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
      </span>
    </div>`;
}

// ── Durum değiştir (optimistic + geri al) ─────────────────────
async function toggleStatus(id) {
  const p = places.find(x => String(x.id) === String(id));
  if (!p) return;
  const prev = { status: p.status, visited_at: p.visited_at };
  const done = p.status !== "done";
  p.status = done ? "done" : "todo";
  p.visited_at = done ? new Date().toISOString() : null;
  renderList(); // anında

  try {
    const res = await fetch(cfg.url + "/rest/v1/places?id=eq." + id, {
      method: "PATCH", headers: headers(),
      body: JSON.stringify({ status: p.status, visited_at: p.visited_at }),
    });
    if (!res.ok) throw new Error(await httpErrorText(res));
  } catch (e) {
    p.status = prev.status; p.visited_at = prev.visited_at; // geri al
    renderList();
    const msg = e.message && e.message.length > 5 ? e.message : "Bağlantı yok — değişiklik kaydedilemedi";
    toast(msg, true);
  }
}

// ── Yer ekle ──────────────────────────────────────────────────
function renderAddChips() {
  $("addCatChips").innerHTML = CATS.map(c =>
    `<button class="chip${addCat === c.slug ? " sel" : ""}" onclick="pickAddCat('${c.slug}')">${c.label}</button>`).join("");
}
function pickAddCat(slug) { addCat = slug; renderAddChips(); }

async function savePlace() {
  const name = normName($("pName").value);
  if (!name) return toast("Yer adını yaz", true);
  const row = { city: CITY, name, category: addCat, status: "todo" };
  const area = normName($("pArea").value);
  const note = $("pNote").value.trim();
  if (area) row.area = area;
  if (note) row.note = note;

  $("saveBtn").disabled = true;
  let res;
  try {
    res = await fetch(cfg.url + "/rest/v1/places", { method: "POST", headers: headers(), body: JSON.stringify(row) });
  } catch (e) {
    $("saveBtn").disabled = false;
    return toast("Bağlantı yok — kaydedilemedi, tekrar dene", true);
  }
  $("saveBtn").disabled = false;
  if (!res.ok) return toast(await httpErrorText(res), true);
  toast("Eklendi ✓");
  show("home");
}

// ── Kurulum ───────────────────────────────────────────────────
async function saveConfig() {
  let url = $("supaUrl").value.trim().replace(/\/+$/, "");
  const key = $("supaKey").value.trim();
  const errEl = $("setupErr");
  const dash = url.match(/supabase\.com\/dashboard\/project\/([a-z0-9]{15,25})/);
  if (dash) url = "https://" + dash[1] + ".supabase.co";
  url = url.replace(/\/rest\/v1\/?$/, "");
  if (url && !/^https?:\/\//.test(url)) url = "https://" + url;
  if (!url || !key) { errEl.textContent = "İki alanı da doldur."; return; }

  $("connectBtn").disabled = true;
  errEl.textContent = "Bağlantı deneniyor…";
  try {
    const res = await fetch(url + "/rest/v1/places?select=id&limit=1", {
      headers: { "apikey": key, "Authorization": "Bearer " + key },
    });
    if (!res.ok) { errEl.textContent = "✗ " + await httpErrorText(res); $("connectBtn").disabled = false; return; }
  } catch (e) {
    errEl.textContent = "✗ Sunucuya ulaşılamadı. URL'yi ve internet bağlantını kontrol et.";
    $("connectBtn").disabled = false;
    return;
  }
  $("connectBtn").disabled = false;
  errEl.textContent = "";
  localStorage.setItem("supaUrl", url);
  localStorage.setItem("supaKey", key);
  cfg.url = url; cfg.key = key;
  toast("Bağlantı doğrulandı ✓");
  show("home");
}

// ── Başlangıç ─────────────────────────────────────────────────
if (!cfg.url || !cfg.key) show("setup");
else loadPlaces();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
</body>
</html>
